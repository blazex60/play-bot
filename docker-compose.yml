services:
  music-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    network_mode: "host"

  music-web:
    build: .
    restart: unless-stopped
    command: ["node", "src/web/server/index.js"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    network_mode: "host"
    depends_on:
      - music-bot

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file:
      - .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: "host"
    depends_on:
      - music-web
